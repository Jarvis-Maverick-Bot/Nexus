name: Governance or runtime design proposal
description: Propose a public-safe improvement to Nexus governance, lifecycle, evidence, or runtime boundaries.
title: "Design: "
labels: ["governance", "design"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for public-safe design proposals. Do not include private governance docs, credentials, or non-public evidence.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What governance/runtime problem should Nexus address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and authority boundaries
      description: How does this preserve human authority, evidence, and fail-closed behavior?
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or examples
      description: Link to public-safe examples, tests, or related issues.
