<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Nexus architecture overview</title>
  <desc id="desc">A layered architecture diagram showing human authority, governance gates, runtime lifecycle, evidence records, and delivery surfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .label { font: 700 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .tiny { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .box-title { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .box-copy { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .stroke { stroke: #cbd5e1; stroke-width: 1.5; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="640" fill="url(#bg)"/>
  <text x="60" y="70" class="label">Nexus: governed agentic delivery</text>
  <text x="60" y="102" class="small">Authority, lifecycle, evidence, and promotion controls for multi-agent software work.</text>

  <rect x="58" y="145" width="1084" height="84" rx="14" fill="#ffffff" class="stroke" filter="url(#shadow)"/>
  <text x="90" y="180" class="box-title">Human Authority Boundary</text>
  <text x="90" y="207" class="box-copy">Business actions, production execution, runtime promotion, and final acceptance remain explicit human-governed gates.</text>

  <rect x="80" y="285" width="230" height="128" rx="14" fill="#e0f2fe" class="stroke"/>
  <text x="110" y="322" class="box-title">Work Intake</text>
  <text x="110" y="351" class="box-copy">requests</text>
  <text x="110" y="374" class="box-copy">tasks</text>
  <text x="110" y="397" class="box-copy">candidate changes</text>

  <rect x="360" y="285" width="230" height="128" rx="14" fill="#ecfccb" class="stroke"/>
  <text x="390" y="322" class="box-title">Governance Gates</text>
  <text x="390" y="351" class="box-copy">role authority</text>
  <text x="390" y="374" class="box-copy">review decisions</text>
  <text x="390" y="397" class="box-copy">UAT / release gates</text>

  <rect x="640" y="285" width="230" height="128" rx="14" fill="#fef3c7" class="stroke"/>
  <text x="670" y="322" class="box-title">Runtime Lifecycle</text>
  <text x="670" y="351" class="box-copy">registration</text>
  <text x="670" y="374" class="box-copy">readiness / heartbeat</text>
  <text x="670" y="397" class="box-copy">bounded assignment</text>

  <rect x="920" y="285" width="230" height="128" rx="14" fill="#fce7f3" class="stroke"/>
  <text x="950" y="322" class="box-title">Evidence Records</text>
  <text x="950" y="351" class="box-copy">logs and manifests</text>
  <text x="950" y="374" class="box-copy">review artifacts</text>
  <text x="950" y="397" class="box-copy">result candidates</text>

  <path d="M310 349 L354 349" class="arrow"/>
  <path d="M590 349 L634 349" class="arrow"/>
  <path d="M870 349 L914 349" class="arrow"/>

  <rect x="160" y="485" width="260" height="88" rx="14" fill="#ffffff" class="stroke"/>
  <text x="190" y="520" class="box-title">Delivery Surfaces</text>
  <text x="190" y="549" class="box-copy">CLI, dashboard, examples, runbooks</text>

  <rect x="470" y="485" width="260" height="88" rx="14" fill="#ffffff" class="stroke"/>
  <text x="500" y="520" class="box-title">Safety Controls</text>
  <text x="500" y="549" class="box-copy">fail-closed boundaries and no-go rules</text>

  <rect x="780" y="485" width="260" height="88" rx="14" fill="#ffffff" class="stroke"/>
  <text x="810" y="520" class="box-title">Promotion Decisions</text>
  <text x="810" y="549" class="box-copy">only after evidence-backed review</text>

  <path d="M475 413 C475 455 290 440 290 479" class="arrow"/>
  <path d="M755 413 C755 455 600 440 600 479" class="arrow"/>
  <path d="M1035 413 C1035 455 910 440 910 479" class="arrow"/>

  <text x="60" y="618" class="tiny">Public-safe overview: conceptual architecture, not a production-readiness claim.</text>
</svg>
