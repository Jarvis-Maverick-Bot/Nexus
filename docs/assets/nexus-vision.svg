<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Nexus future vision</title>
  <desc id="desc">A roadmap-style vision diagram showing Nexus moving from documented governance to reusable runtime patterns, public evidence examples, and ecosystem integration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9fafb"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .title { font: 700 30px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .step-title { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .step-copy { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .tiny { font: 500 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .stroke { stroke: #cbd5e1; stroke-width: 1.5; }
      .arrow { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="560" fill="url(#bg)"/>
  <text x="60" y="70" class="title">Future vision: trustworthy agentic delivery</text>
  <text x="60" y="102" class="subtitle">Nexus is moving toward reusable governance patterns for teams that want agents to be useful, observable, and bounded.</text>

  <path d="M160 282 L1038 282" class="arrow"/>

  <circle cx="170" cy="282" r="54" fill="#dbeafe" class="stroke"/>
  <text x="122" y="277" class="step-title">Now</text>
  <text x="118" y="300" class="step-copy">public docs</text>

  <rect x="260" y="196" width="210" height="172" rx="18" fill="#ffffff" class="stroke"/>
  <text x="292" y="235" class="step-title">Readable OSS Surface</text>
  <text x="292" y="268" class="step-copy">clear README</text>
  <text x="292" y="292" class="step-copy">license and roadmap</text>
  <text x="292" y="316" class="step-copy">contribution path</text>
  <text x="292" y="340" class="step-copy">public-safe evidence</text>

  <rect x="520" y="196" width="210" height="172" rx="18" fill="#ffffff" class="stroke"/>
  <text x="552" y="235" class="step-title">Reusable Patterns</text>
  <text x="552" y="268" class="step-copy">authority gates</text>
  <text x="552" y="292" class="step-copy">runtime lifecycle</text>
  <text x="552" y="316" class="step-copy">UAT records</text>
  <text x="552" y="340" class="step-copy">promotion controls</text>

  <rect x="780" y="196" width="210" height="172" rx="18" fill="#ffffff" class="stroke"/>
  <text x="812" y="235" class="step-title">Ecosystem Ready</text>
  <text x="812" y="268" class="step-copy">CI and examples</text>
  <text x="812" y="292" class="step-copy">runtime adapters</text>
  <text x="812" y="316" class="step-copy">maintainer workflow</text>
  <text x="812" y="340" class="step-copy">safe integrations</text>

  <circle cx="1060" cy="282" r="60" fill="#dcfce7" class="stroke"/>
  <text x="1012" y="277" class="step-title">Goal</text>
  <text x="1004" y="300" class="step-copy">auditable</text>
  <text x="1005" y="321" class="step-copy">delivery</text>

  <rect x="92" y="440" width="1016" height="54" rx="14" fill="#ffffff" class="stroke"/>
  <text x="122" y="474" class="subtitle">Principle: agents can accelerate delivery, but evidence and human authority decide what is accepted.</text>

  <text x="60" y="532" class="tiny">Public-safe roadmap image: goals and direction, not a claim of OpenAI approval, production readiness, or community adoption.</text>
</svg>
