# V1.6 Agent, workflow, and protocol identity configuration
# This file remains the local source of truth for agent metadata, but now
# includes the minimum identity/trust fields required by the MQ protocol
# skeleton.

agents:
  viper:
    agent_id: "viper"
    display_name: "Viper"
    role: "viper"
    description: "Full-stack delivery agent covering BA, SA, DEV, and QA execution."
    runtime_instance_id: "viper-windows-main-20260507"
    machine_id: "windows-main"
    environment: "local"
    status: "active"
    capabilities:
      - "delivery.ba"
      - "delivery.sa"
      - "delivery.dev"
      - "delivery.qa"
      - "workflow.command"
      - "workflow.result"
    authority_scopes:
      - "workflow.command"
      - "workflow.result"
      - "workflow.review.request"
      - "workflow.feedback"
    trusted_subject_prefixes:
      - "agent.viper."
      - "agent.maverick."
      - "workflow."
      - "review."
      - "feedback."
      - "ops."
    trust_material:
      skeleton_shared_secret_ref: "local:nats-agent-protocol"
      signature_key_ref:
      expires_at: "2026-12-31T00:00:00Z"
    last_rotated_at: "2026-05-07T00:00:00Z"
    stages:
      - "BA"
      - "SA"
      - "DEV"
      - "QA"
    agent_access:
      runtime_type: "local_skeleton"
      registry_status: "active"
      initialization_status: "ready"
      presence_state: "idle"
      heartbeat_ttl_seconds: 60
      startup_packet_ref: "startup-packet://local/viper"
      readiness_evidence_ref: "evidence://local/viper/readiness"
      privacy_scopes:
        - "project"
      allowed_task_boundaries:
        - "delivery"

  maverick:
    agent_id: "maverick"
    display_name: "Maverick"
    role: "maverick"
    description: "Coordination and workflow-orchestration agent."
    runtime_instance_id: "maverick-windows-main-20260507"
    machine_id: "windows-main"
    environment: "local"
    status: "active"
    capabilities:
      - "workflow.command"
      - "workflow.review.request"
      - "workflow.feedback"
      - "coordination.dispatch"
    authority_scopes:
      - "workflow.command"
      - "workflow.review.request"
      - "workflow.feedback"
      - "workflow.callback"
    trusted_subject_prefixes:
      - "agent.viper."
      - "agent.maverick."
      - "workflow."
      - "review."
      - "feedback."
      - "ops."
    trust_material:
      skeleton_shared_secret_ref: "local:nats-agent-protocol"
      signature_key_ref:
      expires_at: "2026-12-31T00:00:00Z"
    last_rotated_at: "2026-05-07T00:00:00Z"
    agent_access:
      runtime_type: "local_skeleton"
      registry_status: "active"
      initialization_status: "ready"
      presence_state: "idle"
      heartbeat_ttl_seconds: 60
      startup_packet_ref: "startup-packet://local/maverick"
      readiness_evidence_ref: "evidence://local/maverick/readiness"
      privacy_scopes:
        - "project"
      allowed_task_boundaries:
        - "coordination"

workflows:
  standard_delivery:
    stages:
      - "BA"
      - "SA"
      - "DEV"
      - "QA"
    description: "Standard governed delivery path"

  fast_track:
    stages:
      - "QA"
    description: "QA-only fast track"
