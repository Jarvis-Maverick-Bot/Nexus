manifest_version: 3.5.foundation-daemon.v1
environment: local
daemon:
  runtime_instance_id: layer3-foundation-daemon-local
  service_name: nexus-mq-foundation-daemon
  default_enabled: false
  rollout_phase: source_only
  lifecycle_timeouts:
    start_seconds: 10
    stop_seconds: 10
    drain_seconds: 10
broker:
  urls:
    - nats://127.0.0.1:4222
  stream: NEXUS_MQ_FOUNDATION
  consumer: nexus-mq-foundation-daemon
  filter_subject: nexus.3_5.mq.inbox
  dlq_subject: nexus.3_5.mq.dlq
subjects:
  allowlist:
    - nexus.3_5.mq.inbox
    - nexus.3_5.mq.results
    - nexus.3_5.mq.retry
    - nexus.3_5.mq.timeout
    - nexus.3_5.mq.dlq
retry:
  max_attempts: 3
  backoff_seconds:
    - 0
    - 0
    - 0
timeout:
  endpoint_first_response_seconds: 30
  endpoint_completion_seconds: 120
stores:
  durable_state:
    dsn: sqlite:///tmp/nexus-mq-foundation-daemon-state.sqlite3
    required_families:
      - foundation_intake
      - foundation_retry
      - foundation_dlq
  evidence:
    dsn: file://tmp/nexus-mq-foundation-daemon-evidence
    required_families:
      - status
      - intake
      - retry
      - dlq
secret_refs:
  nats_credentials_ref: secret-ref://local/nats
feature_flags:
  live_publish_enabled: false
  business_dispatch_enabled: false
  broker_setup_enabled: false
